# this is a workflow job

name: Hello
# runs on a trigger
on: workflow_dispatch

# these are the jobs of workflow

jobs:

  #these are the job name of workflow
  greet:
    # this is github runner
    runs-on: ubuntu-latest
    steps:
      - name: say hello to users
        run: echo "hello Dosto"

      - name: say hello to username
        run: echo "Hello $USER"

  details:
    runs-on: ubuntu-slim
    steps:
      - name: version of python, docker, etc
        run: docker --version && python --version
  
