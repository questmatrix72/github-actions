name: Docker build and Push

on:
    push:
        branches: [main]
    
jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:

            - name: Code Checkout
              uses: actions/checkout@v4

            - name: Login to Docker Build
              uses: docker/login-actions@v3
              with:
                username: ${{vars.DOCKERHUB_USER}}
                password: ${{secrets.DOCKERHUB_TOKEN}}

            - name: Build and Push to Docker Hub
              uses: docker/build-push-actions@v6
              with:
                context: .
                push: true
                tags: |
                  ${{vars.DOCKERHUB_USER}}/github-actions-app:${{github.GITHUB_HEAD_REF}}
                  ${{vars.DOCKERHUB_USER}}/github-actions-app:latest
                  ${{vars.DOCKERHUB_USER}}/github-actions-app:${{github.GITHUB_SHA}}
